<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教數學互動教室</title>
    <style>
        @import url('https://fastly.jsdelivr.net/gh/justfont/open-huninn-font@1.1/font/jf-open-huninn.css');

        :root {
            --primary-color: #4A90E2;
            --secondary-color: #95a5a6;
            --bg-color: #F0F4F8;
            --correct-color: #7ED321;
            --wrong-color: #D0021B;
            --puzzle-color: #F5A623;
        }

        /* 強制套用粉圓體 */
        * {
            font-family: 'jf-open-huninn', "Microsoft JhengHei", sans-serif !important;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        #main-container {
            width: 95%;
            max-width: 1100px;
            background: white;
            padding: 2.5rem;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
        }

        .screen { display: none; }
        .active { display: block; }

        h1 { font-size: 3.2rem; color: var(--primary-color); margin-bottom: 20px; }
        .lobby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .unit-card {
            background: #fff; border: 5px solid #eee; border-radius: 25px; padding: 25px;
            cursor: pointer; transition: all 0.3s;
        }
        .unit-card.active-unit:hover {
            transform: translateY(-8px); border-color: var(--primary-color); background: #f0f7ff;
        }
        .unit-card.locked {
            background: #f9f9f9; color: #ccc; cursor: not-allowed; border: 5px dashed #ddd;
        }

        .btn {
            background: var(--primary-color); color: white; border: none;
            padding: 15px 40px; font-size: 1.8rem; border-radius: 50px;
            cursor: pointer; margin: 10px; transition: transform 0.2s;
        }
        .btn-secondary { background: var(--secondary-color); font-size: 1.4rem; }

        .question-img {
            max-width: 100%; height: 320px; object-fit: contain;
            border-radius: 20px; margin-bottom: 20px; border: 4px solid #f0f0f0;
        }
        .puzzle-display {
            background: #f8f9fa; min-height: 100px; border-radius: 20px;
            margin: 20px 0; display: flex; justify-content: center; align-items: center;
            gap: 15px; padding: 15px; font-size: 3rem; font-weight: bold;
            color: var(--primary-color); border: 5px dashed #dee2e6;
        }
        .piece-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 25px;
        }
        .puzzle-piece {
            background: white; padding: 15px 30px; border: 3px solid var(--puzzle-color);
            border-radius: 15px; font-size: 2.2rem; cursor: pointer; user-select: none;
            transition: all 0.2s;
        }
        .puzzle-piece:hover { background: #fffcf0; transform: scale(1.1); }

        #stamp-area {
            font-size: 3.5rem; color: var(--correct-color); font-weight: bold;
            margin: 30px; padding: 25px; border: 8px dashed var(--correct-color);
            display: inline-block; display: none; background: #f9fff9;
        }
        .quiet-remind { font-size: 1.5rem; color: #888; margin-top: 40px; font-style: italic; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="screen-lobby" class="screen active">
        <h1>🏫 數學冒險大廳</h1>
        <div class="lobby-grid">
            <div class="unit-card active-unit" onclick="goToUnit(1)">
                <h3 style="font-size: 2.2rem;">單元一</h3>
                <p>算式連連看</p>
            </div>
            <div class="unit-card active-unit" onclick="goToUnit(2)">
                <h3 style="font-size: 2.2rem;">單元二</h3>
                <p>算式大拼圖</p>
            </div>
            <div class="unit-card locked"><div class="unit-number">單元三</div><h3 style="font-size: 1.8rem;">敬請期待</h3></div>
            <div class="unit-card locked"><div class="unit-number">單元四</div><h3 style="font-size: 1.8rem;">敬請期待</h3></div>
        </div>
        <p class="quiet-remind">請安靜地思考，準備好了就開始！</p>
    </div>

    <div id="screen-unit1-start" class="screen">
        <h1>📘 單元一：算式連連看</h1>
        <button class="btn" onclick="startUnit1()">進入遊戲</button>
        <button class="btn btn-secondary" onclick="showScreen('screen-lobby')">回大廳</button>
    </div>
    <div id="screen-unit1-game" class="screen">
        <div id="u1-progress" style="font-size: 1.5rem; color:#666;"></div>
        <div id="u1-question" style="font-size: 2.8rem; background:#f0f7ff; padding:35px; margin:25px; border-radius:20px; text-align:left; line-height:1.5;"></div>
        <div id="u1-options" style="display:grid; grid-template-columns:1fr 1fr; gap:20px;"></div>
        <div id="u1-feedback" style="font-size: 2.2rem; margin-top:25px; height:50px; font-weight:bold;"></div>
    </div>

    <div id="screen-unit2-start" class="screen">
        <h1 style="color:var(--puzzle-color)">🧩 單元二：算式大拼圖</h1>
        <p style="font-size: 2rem;">觀察圖片，拼出正確算式！</p>
        <br>
        <button class="btn" style="background:var(--puzzle-color)" onclick="startUnit2()">開始拼圖</button>
        <button class="btn btn-secondary" onclick="showScreen('screen-lobby')">回大廳</button>
    </div>
    <div id="screen-unit2-game" class="screen">
        <div id="u2-progress" style="font-size: 1.5rem; color:#666; margin-bottom:10px;"></div>
        <img id="u2-img" class="question-img" src="" alt="題目圖片">
        <div class="puzzle-display" id="u2-display"></div>
        <div class="piece-container" id="u2-pieces"></div>
        <div style="margin-top: 35px;">
            <button class="btn btn-secondary" onclick="undoU2()">🔙 退回一步</button>
            <button class="btn" style="background:var(--correct-color)" onclick="checkU2Answer()">✅ 檢查算式</button>
        </div>
        <div id="u2-feedback" style="font-size: 2.5rem; margin-top:25px; height:60px; font-weight:bold;"></div>
    </div>

    <div id="screen-result" class="screen">
        <h1 style="font-size: 4rem;">🎉 挑戰完成！</h1>
        <p id="result-text" style="font-size: 2.5rem;"></p>
        <div id="stamp-area">✨ 你可以去蓋印章了 ✨</div>
        <br>
        <button class="btn" onclick="showScreen('screen-lobby')">回遊戲大廳</button>
    </div>
</div>

<script>
    const u1Data = [
        { q: "爸爸有100元，買了15元的飲料3瓶，請問找回多少元？", options: ["100 - 15 × 3", "(100 - 15) × 3", "100 - (15 + 3)", "100 + 15 × 3"], correct: 0 },
        { q: "若涵買了4個30元的橡皮擦跟2個60元的自動鉛筆，請問需要付多少元？", options: ["30 × 4 + 60 × 2", "(30 + 60) × (4 + 2)", "30 + 4 + 60 + 2", "30 × 60 + 4 × 2"], correct: 0 }
    ];

    const u2Data = [
        { img: "image/1-1.jpg", pieces: ["20.8", "6.3", "9.6", "-", "-"], correct: ["20.8", "-", "6.3", "-", "9.6"] },
        { img: "image/1-2.jpg", pieces: ["35", "14.8", "2", "-", "×"], correct: ["35", "-", "14.8", "×", "2"] },
        { img: "image/1-3.jpg", pieces: ["3.6", "6.96", "2", "(", ")", "+", "÷"], correct: ["(", "3.6", "+", "6.96", ")", "÷", "2"] },
        { img: "image/1-4.jpg", pieces: ["1.65", "2", "2.07", "×", "+"], correct: ["1.65", "×", "2", "+", "2.07"] },
        { img: "image/1-5.jpg", pieces: ["7.5", "6.5", "12.5", "2", "×", "÷", "÷"], correct: ["7.5", "×", "6.5", "÷", "12.5", "÷", "2"] },
        { img: "image/1-6.jpg", pieces: ["2 3/8", "1.36", "1 5/8", "+", "+"], correct: ["2 3/8", "+", "1.36", "+", "1 5/8"] },
        { img: "image/1-7.jpg", pieces: ["9.52", "3 2/9", "5.48", "-", "+"], correct: ["9.52", "-", "3 2/9", "+", "5.48"] },
        { img: "image/1-8.jpg", pieces: ["256", "16", "147", "7", "÷", "×", "÷"], correct: ["256", "÷", "16", "×", "147", "÷", "7"] },
        { img: "image/1-9.jpg", pieces: ["5.6", "3.4", "1 5/12", "1 5/12", "×", "+", "×"], correct: ["5.6", "×", "1 5/12", "+", "3.4", "×", "1 5/12"] },
        { img: "image/1-10.jpg", pieces: ["2 4/5", "1.8", "4 1/2", "÷", "×"], correct: ["2 4/5", "÷", "1.8", "×", "4 1/2"] }
    ];

    let currentIdx = 0, currentScore = 0, u2UserAns = [];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function goToUnit(num) { num === 1 ? showScreen('screen-unit1-start') : showScreen('screen-unit2-start'); }

    function startUnit1() { currentIdx = 0; currentScore = 0; showScreen('screen-unit1-game'); loadU1(); }
    function loadU1() {
        const d = u1Data[currentIdx];
        document.getElementById('u1-progress').innerText = `題目：${currentIdx + 1} / ${u1Data.length}`;
        document.getElementById('u1-question').innerText = d.q;
        const optDiv = document.getElementById('u1-options'); optDiv.innerHTML = '';
        d.options.forEach((o, i) => {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = o;
            b.onclick = () => {
                const fb = document.getElementById('u1-feedback');
                if(i === d.correct) { currentScore++; fb.innerText = "⭐ 答對了！"; fb.style.color = "var(--correct-color)"; }
                else { fb.innerText = "❌ 再想想看！"; fb.style.color = "var(--wrong-color)"; }
                setTimeout(() => { currentIdx++; currentIdx < u1Data.length ? loadU1() : finish(u1Data.length); }, 1200);
            };
            optDiv.appendChild(b);
        });
        document.getElementById('u1-feedback').innerText = "";
    }

    function startUnit2() { currentIdx = 0; currentScore = 0; showScreen('screen-unit2-game'); loadU2(); }
    function loadU2() {
        u2UserAns = []; const d = u2Data[currentIdx];
        document.getElementById('u2-progress').innerText = `題目：${currentIdx + 1} / ${u2Data.length}`;
        document.getElementById('u2-img').src = d.img;
        document.getElementById('u2-feedback').innerText = "";
        updateU2Display();
        const pDiv = document.getElementById('u2-pieces'); pDiv.innerHTML = '';
        [...d.pieces].sort(() => Math.random() - 0.5).forEach(p => {
            const b = document.createElement('div'); b.className = 'puzzle-piece'; b.innerText = p;
            b.onclick = () => { u2UserAns.push(p); updateU2Display(); };
            pDiv.appendChild(b);
        });
    }
    function updateU2Display() {
        const disp = document.getElementById('u2-display');
        disp.innerHTML = u2UserAns.length === 0 ? "（點選碎片組裝）" : u2UserAns.join(' ');
    }
    function undoU2() { u2UserAns.pop(); updateU2Display(); }
    function checkU2Answer() {
        const d = u2Data[currentIdx], fb = document.getElementById('u2-feedback');
        if (JSON.stringify(u2UserAns) === JSON.stringify(d.correct)) {
            currentScore++; fb.style.color = 'var(--correct-color)'; fb.innerText = "🎊 太強了！拼對了！";
            setTimeout(() => { currentIdx++; currentIdx < u2Data.length ? loadU2() : finish(u2Data.length); }, 1500);
        } else { fb.style.color = 'var(--wrong-color)'; fb.innerText = "順序不對喔，再試試！"; }
    }
    function finish(total) {
        showScreen('screen-result');
        document.getElementById('result-text').innerText = `好棒！總共答對了 ${currentScore} 題！`;
        document.getElementById('stamp-area').style.display = (currentScore === total) ? 'inline-block' : 'none';
    }
</script>
</body>
</html>
